server:
  addr: "example.com:443"
  sni: "example.com"

auth:
  server_public_key: ""    # hex — from server's ghost-keygen output
  client_private_key: ""   # hex — generated by ghost-keygen

proxy:
  mode: "socks5"           # "socks5" or "tun"
  socks5: "127.0.0.1:1080"
  tun_name: "ghost0"
  dns: "1.1.1.1:53"

shaping:
  default_mode: "balanced"
  profile_path: "profiles/chrome_browsing.json"
  auto_mode: true

log:
  level: "info"
  file: "stdout"
