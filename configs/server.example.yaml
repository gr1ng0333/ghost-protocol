listen: ":443"
domain: "example.com"

tls:
  auto_cert: true
  email: "admin@example.com"
  cache_dir: "/var/lib/ghost/certs"
  # Manual mode (if auto_cert: false):
  # cert_file: "/etc/ghost/cert.pem"
  # key_file: "/etc/ghost/key.pem"

auth:
  server_public_key: ""   # hex, 32 bytes — generated by ghost-keygen
  server_private_key: ""  # hex, 32 bytes — generated by ghost-keygen
  client_public_key: ""   # hex, 32 bytes — from client's ghost-keygen output

backend:
  allowed_ports: []  # empty = all ports allowed

shaping:
  default_mode: "balanced"
  profile_path: "profiles/chrome_browsing.json"
  auto_mode: true

fallback:
  addr: "127.0.0.1:8080"
  use_caddy: true

sessions:
  max_sessions: 10
  idle_timeout_sec: 300

log:
  level: "info"
  file: "stdout"
